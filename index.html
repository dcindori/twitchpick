<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TwitchPick</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="brand">TwitchPick</div>
    <div class="connect-row">
      <div class="input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <input type="text" id="channel-input" placeholder="channel name" autocomplete="off" spellcheck="false" />
      </div>
      <div class="input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="keyword-input" placeholder="keyword (optional)" autocomplete="off" spellcheck="false" />
      </div>
      <button id="connect-btn" class="btn btn-primary">Connect</button>
      <div id="status-badge" class="status-badge disconnected">
        <span class="status-dot"></span>
        <span id="status-text">Disconnected</span>
      </div>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <main class="layout">

    <!-- ===== WHEEL PANEL ===== -->
    <section class="panel wheel-panel">
      <div class="panel-header">
        <h2>Spin Wheel</h2>
        <div class="panel-actions">
          <span id="participant-count" class="badge">0 participants</span>
          <button id="clear-participants-btn" class="btn btn-ghost btn-sm">Clear</button>
        </div>
      </div>

      <!-- Top area: wheel + controls + winner (does not grow) -->
      <div class="wheel-area">
        <!-- THE WHEEL -->
        <div class="wheel-scene" id="wheel-scene">
          <div class="wheel-line wheel-line-top"></div>
          <div class="wheel-line wheel-line-bottom"></div>
          <div class="wheel-highlight-zone"></div>
          <div class="wheel-arrow wheel-arrow-left">&#9654;</div>
          <div class="wheel-arrow wheel-arrow-right">&#9664;</div>
          <div class="wheel-fade wheel-fade-top"></div>
          <div class="wheel-fade wheel-fade-bottom"></div>
          <div class="wheel-slots" id="wheel-slots"></div>
        </div>

        <div class="wheel-controls">
          <button id="spin-btn" class="btn btn-accent btn-lg" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5,3 19,12 5,21"/></svg>
            Spin
          </button>
        </div>

        <!-- Winner + previous winners stay near the wheel -->
        <div id="winner-display" class="winner-display hidden">
          <div class="winner-label">Winner</div>
          <div id="winner-name" class="winner-name"></div>
          <button id="remove-winner-btn" class="btn btn-ghost btn-sm" style="margin-top:8px">Remove &amp; Respin</button>
        </div>

        <div class="prev-winners" id="prev-winners-wrap" style="display:none">
          <div class="section-label">Previous winners</div>
          <div id="prev-winners-list" class="prev-winners-list"></div>
        </div>
      </div>

      <!-- Bottom area: participants (fills remaining space) -->
      <div class="bottom-section" id="participants-section">
        <div class="section-label">Participants</div>
        <div id="participants-list" class="participants-list">
          <span class="empty-hint">Waiting for viewers...</span>
        </div>
      </div>
    </section>

    <!-- ===== WORD CLOUD PANEL ===== -->
    <section class="panel cloud-panel">
      <div class="panel-header">
        <h2>Word Cloud</h2>
        <div class="panel-actions">
          <span id="message-count" class="badge">0 messages</span>
          <button id="reset-cloud-btn" class="btn btn-ghost btn-sm">Reset</button>
        </div>
      </div>

      <!-- Top area: ranked words -->
      <div class="cloud-words-wrap">
        <div id="cloud-words" class="cloud-words">
          <div class="cloud-empty">Connect to a channel to start capturing messages</div>
        </div>
      </div>

      <!-- Bottom area: live chat (matches participants height) -->
      <div class="bottom-section">
        <div class="section-label">Live Chat</div>
        <div id="chat-feed" class="chat-feed">
          <span class="empty-hint">Waiting for messages...</span>
        </div>
      </div>
    </section>

  </main>

  <script src="js/twitch.js"></script>
  <script src="js/wheel.js"></script>
  <script src="js/wordcloud.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
